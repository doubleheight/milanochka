<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Миланочка — наша история</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500;700&display=swap&subset=cyrillic" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Montserrat',sans-serif;
    color:white;
    overflow-x:hidden;

    /* 💥 ЛЕОПАРДОВЫЙ ФОН */
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),
    url("leopard.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:6rem;
    color:#e0aaff;
    text-shadow:0 0 60px #9d4edd;
}

.subtitle{
    font-size:1.4rem;
    margin-top:10px;
    opacity:0.9;
}

/* ТЕКСТ */
#typing{
    margin-top:30px;
    max-width:900px;
    font-size:1.5rem;
    min-height:120px;
    line-height:1.7;
}

/* СЕКЦИИ */
.section{
    padding:100px 20px;
    text-align:center;
}

.section h2{
    font-size:2.8rem;
    color:#e0aaff;
    text-shadow:0 0 30px #9d4edd;
}

/* ГАЛЕРЕЯ */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    margin-top:50px;
}

.card{
    width:320px;
    height:450px;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 50px rgba(123,44,191,0.6);
    transition:.5s;
}

.card:hover{
    transform:scale(1.1);
    filter:brightness(1.2);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ФИНАЛ */
#final{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:9999;
}

#final h1{
    font-size:4rem;
    color:#e0aaff;
    text-shadow:0 0 80px #9d4edd;
}

#final p{
    max-width:800px;
    font-size:1.4rem;
    margin-top:20px;
    line-height:1.8;
}

/* СЕРДЦА */
.heart{
    position:fixed;
    pointer-events:none;
    font-size:18px;
}

/* КНОПКА */
button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:1.2rem;
    cursor:pointer;
    background:linear-gradient(45deg,#7b2cbf,#c77dff);
    color:white;
    box-shadow:0 0 30px #9d4edd;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <div class="title">Миланочка</div>
    <div class="subtitle">Наша история, наши моменты 💜</div>

    <div id="typing"></div>

    <button onclick="finalScene()">💌 открыть финал</button>

</div>

<!-- 📸 НАШИ ФОТО -->
<div class="section">
    <h2>💜 НАШИ ВОСПОМИНАНИЯ</h2>

    <div class="gallery">

        <div class="card">
            <img src="foto1.jpg">
        </div>

        <div class="card">
            <img src="foto2.jpg">
        </div>

        <div class="card">
            <img src="foto3.jpg">
        </div>

    </div>
</div>

<!-- 📸 ЕЁ ЛЮБИМЫЕ ФОТО -->
<div class="section">
    <h2>💜 ЕЁ КРАСОТА</h2>

    <div class="gallery">

        <div class="card">
            <img src="mila1.jpg">
        </div>

        <div class="card">
            <img src="mila2.jpg">
        </div>

        <div class="card">
            <img src="mila3.jpg">
        </div>

    </div>
</div>

<!-- ФИНАЛ -->
<div id="final">
    <h1>💜 ЭТО НАША ИСТОРИЯ 💜</h1>

    <p>
        Миланочка…

 

десь собраны наши моменты

     
 твоя красота.

 

ы — самое важное, что есть в этом мире.
    </p>
</div>

<script>

/* ТЕКСТ */
const text =
"Миланочка... ты не просто человек. Ты — наша история, наши моменты и самая тёплая часть моей жизни. 💜";

let i=0;

function type(){
    if(i<text.length){
        document.getElementById("typing").textContent += text[i];
        i++;
        setTimeout(type,40);
    }
}
type();

/* ФИНАЛ */
function finalScene(){
document.getElementById("final").style.display="flex";
    hearts();
}

/* СЕРДЦА */
function hearts(){
    for(let i=0;i<200;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="💜";

        h.style.left=Math.random()*100+"%";
        h.style.top=Math.random()*100+"%";

        h.animate([
            {transform:"translateY(0)"},
            {transform:"translateY(-120vh)"}
        ],{
            duration:6000+Math.random()*10000,
            iterations:Infinity
        });

        document.body.appendChild(h);
    }
}

</script>

</body>
</html>
