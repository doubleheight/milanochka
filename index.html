<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Миланочки ❤️</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffb6c1, #ffe4e1);
        text-align: center;
        color: #fff;
    }

    h1 {
        margin-top: 40px;
        font-size: 3em;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    h2 {
        font-size: 1.5em;
        margin-bottom: 30px;
    }

    .gallery {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        padding: 20px;
    }

    .gallery img {
        width: 300px;
        height: 400px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .heart {
        font-size: 60px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

<h1>Я люблю тебя, Миланочка ❤️</h1>
<h2>От Ромочки</h2>

<div class="heart">💖</div>

<div class="gallery">
    <img src="foto1.jpg" alt="Фото 1">
    <img src="foto2.jpg" alt="Фото 2">
    <img src="foto3.jpg" alt="Фото 3">
</div>

<p>Ты самая прекрасная! 💕</p>

</body>
</html>
