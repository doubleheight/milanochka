<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💜 Миланочка</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap&subset=cyrillic" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Montserrat',sans-serif;
    color:white;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),
    url("leopard.jpg");
    background-size:cover;
    background-position:center;
}

/* 🔒 ЭКРАН ВХОДА */
#lockscreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:9999;
    transition:opacity 1s ease;
}

#lockscreen h1{
    font-size:2.5rem;
    color:#e0aaff;
}

#lockscreen p{
    margin-top:10px;
    opacity:0.8;
    max-width:80%;
}

/* input */
input{
    margin-top:20px;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    text-align:center;
    font-size:1rem;
}

/* кнопка */
button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#7b2cbf,#c77dff);
    color:white;
    cursor:pointer;
}

/* ❌ ошибка */
#error{
    margin-top:10px;
    color:#ff6b6b;
    display:none;
}

/* 📱 СКРЫТЫЙ КОНТЕНТ */
#app{
    opacity:0;
    transition:opacity 1.2s ease;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:3rem;
    color:#e0aaff;
}

/* ФОТО */
.section{
    padding:60px 20px;
    text-align:center;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:300px;
    height:400px;
    border-radius:20px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<!-- 🔒 LOCKSCREEN -->
<div id="lockscreen">
    <h1>💜 разблокируй воспоминание</h1>

    <p>
        подсказка: место, где мы познакомились 💭
    </p>

    <input id="code" placeholder="введи пароль">

    <button onclick="check()">войти</button>

    <div id="error">неверно… попробуй ещё раз</div>
</div>

<!-- 📱 APP -->
<div id="app">

<div class="hero">
    <h1>Миланочка 💜</h1>
</div>

<div class="section">
    <div class="gallery">

        <div class="card"><img src="foto1.jpg"></div>
        <div class="card"><img src="foto2.jpg"></div>
        <div class="card"><img src="foto3.jpg"></div>

        <div class="card"><img src="mila1.jpg"></div>
        <div class="card"><img src="mila2.jpg"></div>
        <div class="card"><img src="mila3.jpg"></div>

    </div>
</div>

</div>

<script>

function check(){
    const value = document.getElementById("code").value.trim().toLowerCase();
    const error = document.getElementById("error");

    if(value === "армия"){
        document.getElementById("lockscreen").style.opacity="0";

        setTimeout(()=>{
            document.getElementById("lockscreen").style.display="none";
            document.getElementById("app").style.opacity="1";
        },1000);

    } else {
        error.style.display="block";
    }
}

</script>

</body>
</html>
