<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Миланочки ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    background: linear-gradient(-45deg,#ff6b9d,#ff8fab,#ffc2d1,#ffe5ec);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    overflow-x:hidden;
    text-align:center;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    padding:50px 20px;
    position:relative;
    z-index:2;
}

h1{
    color:white;
    font-size:4rem;
    text-shadow:0 0 20px rgba(255,255,255,.8);
    animation:fadeIn 2s ease;
}

h2{
    color:white;
    margin-top:15px;
    font-size:2rem;
    animation:fadeIn 3s ease;
}

.text{
    color:white;
    max-width:700px;
    margin:30px auto;
    font-size:1.3rem;
    line-height:1.6;
    animation:fadeIn 4s ease;
}

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:40px;
}

.photo{
    width:300px;
    height:400px;
    overflow:hidden;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
    transition:.5s;
}

.photo:hover{
    transform:translateY(-15px) scale(1.05);
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.heart{
    position:fixed;
    color:white;
    font-size:25px;
    animation:float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{
    margin:60px 0;
    color:white;
    font-size:1.5rem;
}
</style>
</head>

<body>

<div class="container">

<h1>❤️ Я люблю тебя, Миланочка ❤️</h1>

<h2>Твой Ромочка 💖</h2>

<div class="text">
Каждый день рядом с тобой становится особенным.
Спасибо за твою улыбку, тепло и любовь.
Ты самое прекрасное, что случилось в моей жизни.
</div>

<div class="gallery">
    <div class="photo">
        <img src="foto1.jpg" alt="">
    </div>

    <div class="photo">
        <img src="foto2.jpg" alt="">
    </div>

    <div class="photo">
        <img src="foto3.jpg" alt="">
    </div>
</div>

<div class="footer">
💞 Навсегда вместе 💞
</div>

</div>

<script>
for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.innerHTML="❤";
    heart.className="heart";
    heart.style.left=Math.random()*100+"%";
    heart.style.animationDuration=(5+Math.random()*8)+"s";
    heart.style.fontSize=(15+Math.random()*35)+"px";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
