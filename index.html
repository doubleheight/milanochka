<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Миланочка — воспоминания</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Montserrat',sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
    url("leopard.jpg");
    background-size:cover;
    background-attachment:fixed;
    color:white;
    overflow-x:hidden;
}

/* ЗАГОЛОВОК */
.hero{
    min-height:60vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.hero h1{
    font-family:'Playfair Display',serif;
    font-size:5rem;
    color:#e0aaff;
    text-shadow:0 0 40px #9d4edd;
}

.hero p{
    font-size:1.5rem;
    margin-top:20px;
    opacity:0.9;
}

/* ГАЛЕРЕЯ ВОСПОМИНАНИЙ */
.memory{
    display:flex;
    flex-direction:column;
    gap:60px;
    padding:80px 20px;
    align-items:center;
}

.memory-card{
    width:320px;
    height:450px;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 40px #9d4edd;
    opacity:0;
    transform:translateY(80px);
    transition:1s;
    position:relative;
}

.memory-card.show{
    opacity:1;
    transform:translateY(0);
}

.memory-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s;
}

.memory-card:hover img{
    transform:scale(1.1);
    filter:brightness(0.7);
}

/* ТЕКСТ ПРИ НАВЕДЕНИИ */
.memory-card span{
    position:absolute;
    bottom:20px;
    left:20px;
    right:20px;
    font-size:1.2rem;
    opacity:0;
    transition:.5s;
}

.memory-card:hover span{
    opacity:1;
}

/* СЕРДЦА */
.heart{
    position:fixed;
    pointer-events:none;
    font-size:18px;
}

/* КНОПКА */
button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:1.2rem;
    cursor:pointer;
    background:linear-gradient(45deg,#7b2cbf,#c77dff);
    color:white;
}

</style>
</head>

<body>

<div class="hero">
    <h1>💜 Миланочка</h1>
    <p>Это не просто фото. Это мои воспоминания о тебе.</p>

    <button onclick="start()">Открыть воспоминания</button>
</div>

<div class="memory">

    <div class="memory-card">
        <img src="mila1.jpg">
        <span>💜 Моя любимая улыбка</span>
    </div>

    <div class="memory-card">
        <img src="mila2.jpg">
        <span>💜 Момент, который я запомнил навсегда</span>
    </div>

    <div class="memory-card">
        <img src="mila3.jpg">
        <span>💜 Ты самая красивая</span>
    </div>

</div>

<script>

/* ПОЯВЛЕНИЕ КАРТОЧЕК */
function start(){
    let cards=document.querySelectorAll(".memory-card");

    cards.forEach((card,i)=>{
        setTimeout(()=>{
            card.classList.add("show");
        },i*700);
    });

    hearts();
}

/* СЕРДЦА */
function hearts(){
    for(let i=0;i<120;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="💜";

        h.style.left=Math.random()*100+"%";
        h.style.top=Math.random()*100+"%";

        h.animate([
            {transform:"translateY(0)"},
            {transform:"translateY(-120vh)"}
        ],{
            duration:6000+Math.random()*9000,
            iterations:Infinity
        });

        document.body.appendChild(h);
    }
}

</script>

</body>
</html>
