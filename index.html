<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Миланочка — визуальная новелла</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* СЦЕНА */
.scene{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.95)),
    url("leopard.jpg");
    background-size:cover;
    background-position:center;

    padding:40px;
}

/* ТЕКСТ */
#text{
    max-width:900px;
    font-size:1.6rem;
    min-height:120px;
    line-height:1.8;
}

/* ИМЯ */
.name{
    font-family:'Playfair Display',serif;
    font-size:5rem;
    color:#e0aaff;
    text-shadow:0 0 40px #9d4edd;
}

/* КНОПКИ */
.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:1.1rem;
    background:linear-gradient(45deg,#7b2cbf,#c77dff);
    color:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

/* СЕРДЦА */
.heart{
    position:fixed;
    pointer-events:none;
    font-size:18px;
}

/* ВСПЫШКА */
#flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

</style>
</head>

<body>

<div id="flash"></div>

<div class="scene">

    <div class="name">Миланочка</div>

    <div id="text"></div>

    <div class="buttons">

        <button onclick="choice(1)">💜 Ты мне нравишься</button>
        <button onclick="choice(2)">💔 Я боюсь чувств</button>

    </div>

</div>

<script>

let stage = 0;

/* ТЕКСТ СЦЕН */
const scenes = [
"Ты открыла эту историю... и теперь назад уже не будет. 💜",

"Я долго думал, как сказать тебе главное...",
"И понял — это не нужно говорить громко.",
"Это нужно чувствовать.",

"Ты для меня — не просто человек.",
"Ты — состояние, в котором хочется жить.",

"Сейчас будет выбор..."
];

/* ПЕЧАТЬ */
function typeText(text){
    let i=0;
    document.getElementById("text").innerHTML="";

    function typing(){
        if(i<text.length){
            document.getElementById("text").innerHTML += text[i];
            i++;
            setTimeout(typing,30);
        }
    }

    typing();
}

/* СЦЕНЫ */
function nextScene(){
    if(stage < scenes.length){
        typeText(scenes[stage]);
        stage++;
    } else {
        typeText("Выбери своё чувство 💜");
    }
}

nextScene();

/* ВЫБОР */
function choice(n){

    flash();

    if(n===1){
        typeText("💜 Ты сделала выбор, который стал началом моей самой красивой истории...");
        hearts();
    }

    if(n===2){
        typeText("💔 Даже страх не меняет одного — ты для меня важна...");
        hearts();
    }

}

/* ВСПЫШКА */
function flash(){
    let f=document.getElementById("flash");
    f.style.opacity="1";
    setTimeout(()=>f.style.opacity="0",200);
}

/* СЕРДЦА */
function hearts(){
    for(let i=0;i<120;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="💜";

        h.style.left=Math.random()*100+"%";
        h.style.top=Math.random()*100+"%";

        h.animate([
            {transform:"translateY(0)"},
            {transform:"translateY(-120vh)"}
        ],{
            duration:5000+Math.random()*8000,
            iterations:Infinity
        });

        document.body.appendChild(h);
    }
}

/* КЛИК ПРОДОЛЖЕНИЕ */
document.addEventListener("click",()=>{
    if(stage < scenes.length){
        nextScene();
    }
});

</script>

</body>
</html>
